<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TOEFL Reading & Listening</title>
<!-- Declaring an icon stops the browser probing /favicon.ico (a 404 in the server log). -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>">
<style>
  :root { color-scheme: light dark; --bg:#f7f7f8; --card:#fff; --ink:#1a1a1a; --mut:#666; --line:#e3e3e6; --accent:#2f6f8f;
          --ok:#2f8f6b; --bad:#c0392b; }
  @media (prefers-color-scheme: dark){ :root{ --bg:#16171a; --card:#1f2126; --ink:#e8e8ea; --mut:#9aa0a6; --line:#31343b; --accent:#5aa9cc; } }
  * { box-sizing:border-box; }
  body { margin:0; font:16.5px/1.65 system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--ink); }
  header { padding:16px 22px; border-bottom:1px solid var(--line); display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; }
  h1 { font-size:18px; margin:0; }
  #status { font-size:12px; color:var(--mut); }
  .badge { font-size:11px; padding:2px 8px; border-radius:10px; background:var(--line); color:var(--mut); }
  main { width:92%; max-width:1400px; margin:0 auto; padding:20px; }
  .tabs { display:flex; gap:8px; margin-bottom:16px; }
  .tab { flex:1; padding:10px; text-align:center; border:1px solid var(--line); border-radius:10px; cursor:pointer; background:var(--card); font-weight:600; }
  .tab.active { border-color:var(--accent); color:var(--accent); }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:18px; margin-bottom:16px; }
  .title { font-weight:700; font-size:16px; margin-bottom:4px; }
  .kind { font-size:11px; color:var(--mut); text-transform:uppercase; letter-spacing:.05em; }
  .passage { white-space:pre-wrap; margin-top:10px; }
  .q { margin:14px 0; }
  .q .stem { font-weight:600; margin-bottom:6px; }
  .opt { display:block; padding:8px 10px; border:1px solid var(--line); border-radius:8px; margin:5px 0; cursor:pointer; }
  .opt input { margin-right:8px; }
  .opt.correct { border-color:var(--ok); background:color-mix(in srgb, var(--ok) 12%, transparent); }
  .opt.wrong { border-color:var(--bad); background:color-mix(in srgb, var(--bad) 12%, transparent); }
  .expl { font-size:13px; color:var(--mut); margin-top:4px; }
  button { font:inherit; border:0; border-radius:9px; padding:10px 16px; font-weight:600; cursor:pointer; background:var(--accent); color:#fff; }
  button.ghost { background:var(--line); color:var(--ink); }
  .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-top:8px; }
  .score { font-size:30px; font-weight:700; }
  .hint { font-size:12px; color:var(--mut); }
  .hidden { display:none; }
  .timer { position:fixed; right:16px; bottom:16px; z-index:1000; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:10px 12px; box-shadow:0 6px 22px rgba(0,0,0,.18); text-align:center; min-width:150px; }
  .timer.run { border-color:var(--accent); }
  .t-display { font-size:30px; font-weight:800; font-variant-numeric:tabular-nums; letter-spacing:1px; }
  .t-display.over { color:#c0392b; }
  .t-row { display:flex; gap:6px; align-items:center; justify-content:center; margin-top:7px; font-size:12px; color:var(--mut); }
  .t-btn { margin:0; background:var(--line); color:var(--ink); border:0; border-radius:8px; padding:6px 10px; font-weight:700; font-size:14px; cursor:pointer; }
  .t-min { width:52px; margin:0; padding:4px 6px; text-align:center; font:inherit; color:inherit; background:transparent; border:1px solid var(--line); border-radius:6px; }
</style>
</head>
<body>
<header><h1>📖 TOEFL Reading &amp; Listening</h1><span id="status">…</span></header>
<main>
  <div class="tabs">
    <div class="tab active" data-sec="reading">Reading</div>
    <div class="tab" data-sec="listening">Listening</div>
  </div>

  <section class="card" id="stimCard">
    <div class="kind" id="kind"></div>
    <div class="title" id="title"></div>
    <div id="listenControls" class="row hidden">
      <button id="play">🔊 Play audio</button>
      <button id="replay" class="ghost">↻ Replay</button>
      <span class="hint">Listening only — the transcript is not shown. Play, take notes, then answer.</span>
    </div>
    <div class="passage" id="passage"></div>
  </section>

  <section class="card"><div id="questions"></div>
    <div class="row">
      <button id="submit">Submit answers</button>
      <button id="next" class="ghost">Next ▸</button>
      <span id="result" class="score"></span>
    </div>
  </section>
</main>
<script>
const $ = s => document.querySelector(s);
let SEC = "reading", idx = 0, cur = null;

async function boot(){
  const st = await (await fetch('/api/status')).json();
  $('#status').innerHTML = `<span class="badge">reading: ${st.reading}</span> <span class="badge">listening: ${st.listening}</span> <span class="badge">free · auto-scored</span>`;
  load();
}

document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  t.classList.add('active'); SEC = t.dataset.sec; idx = 0; load();
}));

async function load(){
  speechSynthesis.cancel();
  $('#result').textContent = '';
  const d = await (await fetch(`/api/item?section=${SEC}&i=${idx}`)).json();
  if (d.error){ $('#questions').innerHTML = `<p class="hint">${d.error}</p>`; $('#passage').textContent=''; return; }
  cur = d; idx = d.i;
  const tag = d.source === 'real'
    ? '<span class="badge" style="background:#2f8f6b;color:#fff">🟢 真题 Real</span>'
    : '<span class="badge" style="background:#3b6ea5;color:#fff">🔵 AI 练习题</span>';
  $('#kind').innerHTML = tag + ' ' + (d.kind||'').replace(/_/g,' ') + `  ·  ${d.i+1}/${d.total}`;
  $('#title').textContent = d.title || '';
  if (SEC === 'listening'){
    $('#listenControls').classList.remove('hidden');
    $('#passage').textContent = '';           // never show the transcript
  } else {
    $('#listenControls').classList.add('hidden');
    $('#passage').textContent = d.passage || '';
  }
  $('#questions').innerHTML = d.questions.map((q,qi) =>
    `<div class="q" data-qi="${qi}"><div class="stem">${qi+1}. ${esc(q.q)}</div>` +
    q.options.map((o,oi) =>
      `<label class="opt"><input type="radio" name="q${qi}" value="${oi}">${esc(o)}</label>`).join('') +
    `<div class="expl hidden"></div></div>`).join('');
}

function speak(){
  if (SEC !== 'listening' || !cur) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(cur.transcript);
  u.lang = 'en-US'; u.rate = 1.0;
  speechSynthesis.speak(u);
}
$('#play').addEventListener('click', speak);
$('#replay').addEventListener('click', speak);

$('#submit').addEventListener('click', async () => {
  if (!cur) return;
  const answers = cur.questions.map((_,qi) => {
    const sel = document.querySelector(`input[name="q${qi}"]:checked`);
    return sel ? +sel.value : -1;
  });
  const r = await (await fetch('/api/check', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ section: SEC, id: cur.id, answers })
  })).json();
  const pct = Math.round(r.score*100);
  $('#result').innerHTML = `${r.correct}/${r.total} <span class="hint">(${pct}%)</span>`;
  r.results.forEach((res,qi) => {
    const qEl = document.querySelector(`.q[data-qi="${qi}"]`);
    qEl.querySelectorAll('.opt').forEach((opt,oi) => {
      if (oi === res.answer) opt.classList.add('correct');
      else if (oi === res.chosen && !res.correct) opt.classList.add('wrong');
    });
    const ex = qEl.querySelector('.expl');
    ex.textContent = '💡 ' + res.explanation; ex.classList.remove('hidden');
  });
  speechSynthesis.cancel();
});

$('#next').addEventListener('click', () => { idx++; load(); });
const esc = s => (s||'').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
boot();
</script>

<!-- global floating timer -->
<div class="timer" id="timerWidget">
  <div class="t-display" id="tDisplay">10:00</div>
  <div class="t-row">
    <button class="t-btn" id="tStart" title="start / pause">▶</button>
    <button class="t-btn" id="tReset" title="reset">↺</button>
    <button class="t-btn" id="tMode" title="switch count-down / count-up">⏳</button>
    <input class="t-min" id="tMin" type="number" min="0" max="180" value="10"> m
  </div>
</div>
<script>
(function(){
  const g=id=>document.getElementById(id);
  const disp=g('tDisplay'), minEl=g('tMin'), widget=g('timerWidget'), startBtn=g('tStart');
  let mode='down', running=false, elapsed=0, target=600, raf=null, last=0;
  const fmt=s=>{s=Math.max(0,Math.round(s));return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');};
  function render(){let s=mode==='down'?target-elapsed:elapsed;if(mode==='down'&&s<=0){s=0;disp.classList.add('over');if(running)stop();}else disp.classList.remove('over');disp.textContent=fmt(s);}
  function loop(ts){if(!running)return;if(!last)last=ts;elapsed+=(ts-last)/1000;last=ts;render();raf=requestAnimationFrame(loop);}
  function start(){running=true;last=0;widget.classList.add('run');startBtn.textContent='⏸';raf=requestAnimationFrame(loop);}
  function stop(){running=false;cancelAnimationFrame(raf);widget.classList.remove('run');startBtn.textContent='▶';}
  function reset(){stop();elapsed=0;target=(+minEl.value||0)*60;disp.classList.remove('over');render();}
  function setMode(m){mode=m;g('tMode').textContent=m==='down'?'⏳':'⏱';reset();}
  startBtn.onclick=()=>running?stop():start();
  g('tReset').onclick=reset;
  g('tMode').onclick=()=>setMode(mode==='down'?'up':'down');
  minEl.onchange=()=>{target=(+minEl.value||0)*60;if(!running)reset();};
  window.setTimerMinutes=m=>{minEl.value=m;if(!running){target=m*60;elapsed=0;render();}};
  setMode('down');
})();
</script>
</body>
</html>
