<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TOEFL Speaking App</title>
<style>
  :root { color-scheme: light dark; --bg:#f7f7f8; --card:#fff; --ink:#1a1a1a; --mut:#666; --line:#e3e3e6; --accent:#2f8f6b; --warn:#b5651d; }
  @media (prefers-color-scheme: dark){ :root{ --bg:#16171a; --card:#1f2126; --ink:#e8e8ea; --mut:#9aa0a6; --line:#31343b; --accent:#5cc39a; } }
  * { box-sizing:border-box; }
  body { margin:0; font:16.5px/1.6 system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--ink); }
  header { padding:16px 22px; border-bottom:1px solid var(--line); display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; }
  h1 { font-size:18px; margin:0; }
  #status { font-size:12px; color:var(--mut); }
  .badge { font-size:11px; padding:2px 8px; border-radius:10px; background:var(--line); color:var(--mut); }
  .warn { color:var(--warn); }
  main { width:92%; max-width:1100px; margin:0 auto; padding:20px; }
  .tabs { display:flex; gap:8px; margin-bottom:16px; }
  .tab { flex:1; padding:10px; text-align:center; border:1px solid var(--line); border-radius:10px; cursor:pointer; background:var(--card); font-weight:600; }
  .tab.active { border-color:var(--accent); color:var(--accent); }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:18px; }
  .prompt { font-size:19px; margin:6px 0 14px; }
  .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  button { font:inherit; border:0; border-radius:9px; padding:10px 16px; font-weight:600; cursor:pointer; background:var(--line); color:var(--ink); }
  button.primary { background:var(--accent); color:#fff; }
  button.rec { background:#c0392b; color:#fff; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  .hint { font-size:12px; color:var(--mut); margin-top:4px; }
  label { display:block; font-size:12px; color:var(--mut); margin:14px 0 4px; text-transform:uppercase; letter-spacing:.04em; }
  .result { margin-top:16px; }
  .transcript { background:var(--bg); border-radius:8px; padding:10px 12px; white-space:pre-wrap; }
  .meter { height:12px; border-radius:6px; background:var(--line); overflow:hidden; margin-top:6px; }
  .meter > div { height:100%; background:var(--accent); }
  .band { font-size:34px; font-weight:700; }
  .band small { font-size:13px; color:var(--mut); font-weight:400; }
  .crit { border-top:1px solid var(--line); padding:8px 0; }
  .crit b { display:inline-block; min-width:150px; } .score { color:var(--accent); font-weight:700; }
  ul { margin:6px 0 0; padding-left:18px; }
  .hidden { display:none; }
  .timer { position:fixed; right:16px; bottom:16px; z-index:1000; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:10px 12px; box-shadow:0 6px 22px rgba(0,0,0,.18); text-align:center; min-width:150px; }
  .timer.run { border-color:var(--accent); }
  .t-display { font-size:30px; font-weight:800; font-variant-numeric:tabular-nums; letter-spacing:1px; }
  .t-display.over { color:#c0392b; }
  .t-row { display:flex; gap:6px; align-items:center; justify-content:center; margin-top:7px; font-size:12px; color:var(--mut); }
  .t-btn { margin:0; background:var(--line); color:var(--ink); border:0; border-radius:8px; padding:6px 10px; font-weight:700; font-size:14px; cursor:pointer; }
  .t-min { width:52px; margin:0; padding:4px 6px; text-align:center; font:inherit; color:inherit; background:transparent; border:1px solid var(--line); border-radius:6px; }
</style>
</head>
<body>
<header><h1>🎙️ TOEFL Speaking App</h1><span id="status">…</span></header>
<main>
  <div class="tabs">
    <div class="tab active" data-mode="repeat">Listen &amp; Repeat</div>
    <div class="tab" data-mode="interview">Take an Interview</div>
  </div>

  <section class="card">
    <div class="hint" id="topic"></div>
    <label id="promptLabel">Prompt</label>
    <div class="prompt" id="prompt">…</div>
    <div class="row">
      <button id="play">🔊 Play prompt</button>
      <button id="record" class="rec">⏺ Record</button>
      <button id="stop" disabled>⏹ Stop</button>
      <button id="next">Next ▸</button>
      <button id="modelBtn" class="hidden" title="Show a top-band example answer">💡 Model answer</button>
      <button id="gen" title="Generate a brand-new item with the LLM">✨ Fresh</button>
    </div>
    <div class="hint" id="recHint">Click Play to hear it, then Record your answer and Stop when done.</div>
    <div class="result hidden" id="result"></div>
  </section>
</main>
<script>
const $ = s => document.querySelector(s);
let MODE = "repeat", idx = 0, current = "", OFFLINE = false, LIVEGEN = false;
let questions = [], qi = 0, topic = "", total = 0, isBank = true, prov = 'ai';
let mediaRecorder, chunks = [], stream;

async function boot(){
  const st = await (await fetch('/api/status')).json();
  OFFLINE = st.offline; LIVEGEN = st.live_generation;
  $('#status').innerHTML = `<span class="badge">whisper: ${st.whisper}</span> ` +
    (st.offline ? `<span class="badge warn">SCORING OFFLINE</span> ${st.hint}`
                : `<span class="badge">LIVE · ${st.provider} · ${st.model}</span>`);
  $('#gen').style.display = LIVEGEN ? '' : 'none';
  loadItem();
}

document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  t.classList.add('active'); MODE = t.dataset.mode; idx = 0; qi = 0; loadItem();
}));

// Load an item from the bank (repeat: one sentence; interview: one topic + 4 questions).
async function loadItem(){
  $('#result').classList.add('hidden');
  if (MODE === 'repeat'){
    const d = await (await fetch(`/api/repeat?i=${idx}`)).json();
    idx = d.i; total = d.total; prov = d.provenance; $('#topic').textContent = '';
    showRepeat(d.sentence, `Repeat this sentence (${idx+1}/${total})`);
  } else {
    const d = await (await fetch(`/api/interview?i=${idx}`)).json();
    idx = d.i; total = d.total; questions = d.questions; qi = 0; isBank = true; prov = d.provenance;
    showInterview(d.topic);
  }
}

function provBadge(p){
  return p === 'real'
    ? '<span class="badge" style="background:#2f8f6b;color:#fff">🟢 真题</span> '
    : '<span class="badge" style="background:#3b6ea5;color:#fff">🔵 AI 练习题</span> ';
}

function showRepeat(sentence, label){
  current = sentence;
  $('#promptLabel').innerHTML = provBadge(prov) + label;
  $('#prompt').textContent = sentence;
  $('#modelBtn').classList.add('hidden');
}

function showInterview(t){
  topic = t;
  current = questions[qi] || '';
  $('#topic').innerHTML = provBadge(prov) + `Interview topic: ${topic}`;
  $('#promptLabel').textContent = `Answer this question (Q${qi+1}/${questions.length}` +
     (MODE==='interview' && total ? `, topic ${idx+1}/${total}` : '') + `)`;
  $('#prompt').textContent = current;
  $('#modelBtn').classList.toggle('hidden', !isBank);   // bank topics have a pre-written example
}

// Show the pre-written top-band example answer (bank interview questions) without recording.
$('#modelBtn')?.addEventListener('click', async () => {
  const box = $('#result'); box.classList.remove('hidden');
  box.innerHTML = '<label>Model answer (pre-written top-band example)</label><div class="transcript" id="modelAns">Loading…</div>';
  try {
    const m = await (await fetch(`/api/interview/model?i=${idx}&q=${qi}`)).json();
    $('#modelAns').textContent = m.answer || '(no pre-written example — record & score to get one for a generated topic)';
  } catch(e){ $('#modelAns').textContent = 'Error loading example.'; }
});

async function fillBankModel(){   // after scoring a bank question, prefer the Claude-written example
  try {
    const m = await (await fetch(`/api/interview/model?i=${idx}&q=${qi}`)).json();
    if (m.answer){
      const el = $('#modelAns'); if (el) el.textContent = m.answer;
      const l = $('#modelAnsLabel'); if (l) l.textContent = 'Model answer (pre-written top-band example)';
    }
  } catch(e){}
}

// Next: repeat -> next sentence; interview -> next question, then next topic.
$('#next').addEventListener('click', () => {
  if (MODE === 'repeat'){ idx++; loadItem(); }
  else if (qi < questions.length - 1){ qi++; $('#result').classList.add('hidden'); showInterview(topic); }
  else { idx++; loadItem(); }
});

// Fresh: generate a brand-new item with the LLM (falls back to bank server-side).
$('#gen').addEventListener('click', async () => {
  $('#recHint').textContent = 'Generating a fresh item…';
  if (MODE === 'repeat'){
    const d = await (await fetch('/api/repeat/generate')).json();
    showRepeat(d.sentence, `Repeat this sentence (${d.source})`);
  } else {
    const d = await (await fetch('/api/interview/generate')).json();
    questions = d.questions; qi = 0; total = 0; idx = 0; isBank = false;
    showInterview(d.topic);
  }
  $('#result').classList.add('hidden');
  $('#recHint').textContent = 'Fresh item ready. Play, then Record.';
});

$('#play').addEventListener('click', () => {
  const u = new SpeechSynthesisUtterance(current);
  u.lang = 'en-US'; u.rate = MODE === 'repeat' ? 0.95 : 1.0;
  speechSynthesis.cancel(); speechSynthesis.speak(u);
});

$('#record').addEventListener('click', async () => {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch(e){ $('#recHint').innerHTML = `<span class="warn">Mic blocked: ${e.name}. Allow microphone access (and use http://localhost).</span>`; return; }
  chunks = [];
  mediaRecorder = new MediaRecorder(stream);
  mediaRecorder.ondataavailable = e => chunks.push(e.data);
  mediaRecorder.onstop = upload;
  mediaRecorder.start();
  $('#record').disabled = true; $('#stop').disabled = false;
  $('#recHint').textContent = '● Recording… speak now, then Stop.';
});

$('#stop').addEventListener('click', () => {
  mediaRecorder.stop(); stream.getTracks().forEach(t => t.stop());
  $('#record').disabled = false; $('#stop').disabled = true;
  $('#recHint').textContent = 'Transcribing & scoring…';
});

async function upload(){
  const blob = new Blob(chunks, { type: 'audio/webm' });
  const fd = new FormData();
  fd.append('audio', blob, 'clip.webm');
  const ep = MODE === 'repeat' ? '/api/repeat/score' : '/api/interview/score';
  fd.append(MODE === 'repeat' ? 'target' : 'question', current);
  try {
    const r = await fetch(ep, { method: 'POST', body: fd });
    render(await r.json());
    $('#recHint').textContent = 'Done. Play again, re-record, or go Next.';
  } catch(e){ $('#recHint').innerHTML = `<span class="warn">Error: ${e}</span>`; }
}

function render(d){
  const box = $('#result'); box.classList.remove('hidden');
  const escaped = s => (s||'').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  if (MODE === 'repeat'){
    const pct = Math.round((d.accuracy||0)*100);
    box.innerHTML = `<label>You said</label><div class="transcript">${escaped(d.transcript) || '(nothing transcribed)'}</div>
      <label>Word match vs. target</label><div class="band">${pct}%</div>
      <div class="meter"><div style="width:${pct}%"></div></div>`;
  } else {
    const crits = Object.entries(d.criteria||{}).map(([k,v]) =>
      `<div class="crit"><b>${k}</b> <span class="score">${v.score}</span><br><span class="hint">${escaped(v.comment)}</span></div>`).join('');
    const fixes = (d.top_fixes||[]).map(f => `<li>${escaped(f)}</li>`).join('');
    box.innerHTML = `${d.offline ? '<p class="warn">⚠ Offline stub — set GEMINI_API_KEY (free) for real scoring.</p>':''}
      <label>You said (transcript)</label><div class="transcript">${escaped(d.transcript) || '(nothing transcribed)'}</div>
      <label>Task score</label><div class="band">${d.band}<small> / 5</small></div>
      ${crits}<label>Top fixes</label><ul>${fixes}</ul>
      <label id="modelAnsLabel">Model answer to aim for</label><div class="transcript" id="modelAns">${escaped(d.revised)}</div>`;
    if (isBank) fillBankModel();
  }
}
boot();
</script>

<!-- global floating timer -->
<div class="timer" id="timerWidget">
  <div class="t-display" id="tDisplay">02:00</div>
  <div class="t-row">
    <button class="t-btn" id="tStart" title="start / pause">▶</button>
    <button class="t-btn" id="tReset" title="reset">↺</button>
    <button class="t-btn" id="tMode" title="switch count-down / count-up">⏳</button>
    <input class="t-min" id="tMin" type="number" min="0" max="180" value="2"> m
  </div>
</div>
<script>
(function(){
  const g=id=>document.getElementById(id);
  const disp=g('tDisplay'), minEl=g('tMin'), widget=g('timerWidget'), startBtn=g('tStart');
  let mode='down', running=false, elapsed=0, target=120, raf=null, last=0;
  const fmt=s=>{s=Math.max(0,Math.round(s));return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');};
  function render(){let s=mode==='down'?target-elapsed:elapsed;if(mode==='down'&&s<=0){s=0;disp.classList.add('over');if(running)stop();}else disp.classList.remove('over');disp.textContent=fmt(s);}
  function loop(ts){if(!running)return;if(!last)last=ts;elapsed+=(ts-last)/1000;last=ts;render();raf=requestAnimationFrame(loop);}
  function start(){running=true;last=0;widget.classList.add('run');startBtn.textContent='⏸';raf=requestAnimationFrame(loop);}
  function stop(){running=false;cancelAnimationFrame(raf);widget.classList.remove('run');startBtn.textContent='▶';}
  function reset(){stop();elapsed=0;target=(+minEl.value||0)*60;disp.classList.remove('over');render();}
  function setMode(m){mode=m;g('tMode').textContent=m==='down'?'⏳':'⏱';reset();}
  startBtn.onclick=()=>running?stop():start();
  g('tReset').onclick=reset;
  g('tMode').onclick=()=>setMode(mode==='down'?'up':'down');
  minEl.onchange=()=>{target=(+minEl.value||0)*60;if(!running)reset();};
  window.setTimerMinutes=m=>{minEl.value=m;if(!running){target=m*60;elapsed=0;render();}};
  setMode('down');
})();
</script>
</body>
</html>
