<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>vocab · 登录</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100dvh; display: grid; place-items: center;
    font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: #f6f7f9; color: #1a1a1a; padding: 24px;
  }
  @media (prefers-color-scheme: dark) { body { background: #16181c; color: #e8e8e8; } }
  form {
    width: min(380px, 100%); background: #fff; border-radius: 16px; padding: 32px 28px;
    box-shadow: 0 6px 32px rgba(0,0,0,.08); display: grid; gap: 16px;
  }
  @media (prefers-color-scheme: dark) { form { background: #22252b; box-shadow: none; } }
  h1 { margin: 0; font-size: 22px; }
  p  { margin: 0; font-size: 14px; opacity: .7; }
  input, button { font: inherit; padding: 12px 14px; border-radius: 10px; border: 1px solid #ccd; }
  input { width: 100%; }
  @media (prefers-color-scheme: dark) {
    input { background: #1a1c21; color: #e8e8e8; border-color: #3a3f47; }
  }
  button { border: 0; background: #2f6fed; color: #fff; font-weight: 600; cursor: pointer; }
  button:disabled { opacity: .6; cursor: default; }
  .err { color: #d33; font-size: 14px; min-height: 20px; }
</style>
</head>
<body>
<form id="f">
  <h1>🔑 vocab</h1>
  <p>这个站点是单人使用的，输入口令后会记住这台设备一年。</p>
  <input id="pw" type="password" placeholder="口令" autocomplete="current-password" autofocus>
  <button id="go" type="submit">进入</button>
  <div class="err" id="err"></div>
</form>
<script>
const f = document.getElementById('f'), pw = document.getElementById('pw');
const err = document.getElementById('err'), go = document.getElementById('go');
f.addEventListener('submit', async (e) => {
  e.preventDefault();
  err.textContent = ''; go.disabled = true;
  try {
    const r = await fetch('/api/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw.value })
    });
    if (r.ok) { location.href = '/'; return; }
    err.textContent = '口令不对';
  } catch (ex) {
    err.textContent = '网络错误：' + ex;
  }
  go.disabled = false; pw.select();
});
</script>
</body>
</html>
